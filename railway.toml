# Railway: config-as-code overrides the service dashboard for these fields.
# See https://docs.railway.com/guides/config-as-code

[deploy]
# Must listen on 0.0.0.0:$PORT (Railway sets PORT).
startCommand = "python -m gunicorn --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --access-logfile - --error-logfile - billing_webhook:app"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
# Keep old instance up briefly during deploy so public traffic is not dropped mid-swap.
overlapSeconds = "60"
drainingSeconds = "30"
